<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIN APP</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <h2>National Identification Number (NIN) Application Form</h2>

    <form action="#" method="post" enctype="multipart/form-data">

        <fieldset>
            <legend>Personal Information</legend>

            <label>First Name:</label>
            <input type="text" name="first_name" required><br><br>

            <label>Middle Name:</label>
            <input type="text" name="middle_name"><br><br>

            <label>Last Name:</label>
            <input type="text" name="last_name" required><br><br>

            <label>Date of Birth:</label>
            <input type="date" name="dob" required><br><br>

            <label>Place of Birth:</label>
            <input type="text" name="place_of_birth" required><br><br>

            <label>Gender:</label>
            <select name="gender" required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select><br><br>

            <label>Marital Status:</label>
            <select name="marital_status">
                <option value="">Select</option>
                <option value="single">Single</option>
                <option value="married">Married</option>
                <option value="divorced">Divorced</option>
                <option value="widowed">Widowed</option>
            </select><br><br>

            <label>Nationality:</label>
            <input type="text" name="nationality" required><br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Contact Information</legend>

            <label>Residential Address:</label><br>
            <textarea name="address" rows="3" cols="30" required></textarea><br><br>

            <label>Phone Number:</label>
            <input type="tel" name="phone" required><br><br>

            <label>Email Address:</label>
            <input type="email" name="email"><br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Parent/Guardian Information (If Applicant is Minor)</legend>

            <label>Parent/Guardian Full Name:</label>
            <input type="text" name="guardian_name"><br><br>

            <label>Parent/Guardian Phone:</label>
            <input type="tel" name="guardian_phone"><br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Upload Documents</legend>

            <label>Passport Photograph:</label>
            <input type="file" name="passport_photo" accept="image/*" required><br><br>

            <label>Birth Certificate:</label>
            <input type="file" name="birth_certificate" accept=".pdf,image/*"><br><br>

            <label>Proof of Address:</label>
            <input type="file" name="proof_of_address" accept=".pdf,image/*"><br><br>
        </fieldset>

        <br>

        <input type="submit" value="Submit Application">

    </form>
    <hr>

    <div id="ninSlip" class="nin-slip" style="display: none;">
        <h3>NATIONAL IDENTIFICATION SLIP</h3>

        <div class="slip-content">
            <div class="slip-left">
                <img id="slipPhoto" src="" alt="Passport Photo">
            </div>

            <div class="slip-right">
                <p><strong>NIN:</strong> <span id="displayNin"></span></p>
                <p><strong>Full Name:</strong> <span id="displayName"></span></p>
                <p><strong>Date of Birth:</strong> <span id="displayDob"></span></p>
                <p><strong>Gender:</strong> <span id="displayGender"></span></p>
                <p><strong>Phone:</strong> <span id="displayPhone"></span></p>
                <p><strong>Address:</strong> <span id="displayAddress"></span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
